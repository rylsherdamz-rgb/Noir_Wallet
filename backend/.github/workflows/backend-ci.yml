name: Backend CI

on:
  push:
    branches: [main, backend]
    paths:
      - 'asset/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'asset/backend/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Fast checks (no DB needed) ───────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asset/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            asset/backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('asset/backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --locked

      - name: cargo clippy
        run: cargo clippy --locked -- -D warnings

  # ── Unit tests (no DB needed) ────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asset/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            asset/backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('asset/backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo test (unit)
        run: cargo test --locked

  # ── Integration tests (Postgres service) ─────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asset/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: noir_user
          POSTGRES_PASSWORD: noir_password
          POSTGRES_DB: noir_wallet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://noir_user:noir_password@localhost:5432/noir_wallet_test
      STELLAR_NETWORK: testnet
      STELLAR_RPC_URL: https://soroban-testnet.stellar.org

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            asset/backend/target
          key: ${{ runner.os }}-cargo-int-${{ hashFiles('asset/backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        run: sqlx migrate run

      - name: cargo test --test integration
        run: cargo test --locked --test integration

  # ── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t noir-backend:ci asset/backend/

      - name: Smoke-test image binary
        run: docker run --rm --entrypoint /usr/local/bin/noir-backend noir-backend:ci --help || true
