name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: noir-wallet-hackathon
  REGION: us-central1
  SERVICE: noir-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3

      - id: docker-auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/noir-backend/${{ env.SERVICE }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: backend/asset/backend
          file: backend/asset/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/noir-backend/${{ env.SERVICE }}:latest
          region: ${{ env.REGION }}
          env_vars: |
            ENVIRONMENT=development
            STELLAR_NETWORK=testnet
            PDAX_ENVIRONMENT=uat
            API_PORT=8080
            API_KEY=dev-key-not-secure
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            PDAX_USERNAME=PDAX_USERNAME:latest
            PDAX_PASSWORD=PDAX_PASSWORD:latest
            CHANNEL_SECRET_KEY=CHANNEL_SECRET_KEY:latest
            MASTER_KEY_ID=MASTER_KEY_ID:latest
