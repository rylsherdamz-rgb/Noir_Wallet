name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_PUBLIC_STELLAR_MASTER_KEY_ID: ${{ vars.EXPO_PUBLIC_STELLAR_MASTER_KEY_ID }}
  EXPO_PUBLIC_CHANNEL_SECRET_KEY: ${{ secrets.EXPO_PUBLIC_CHANNEL_SECRET_KEY }}
  EXPO_PUBLIC_ISSUER_ADDRESS: ${{ vars.EXPO_PUBLIC_ISSUER_ADDRESS }}
  EXPO_PUBLIC_DEVICE_REGISTRY_CONTRACT: ${{ vars.EXPO_PUBLIC_DEVICE_REGISTRY_CONTRACT }}

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit
        name: TypeScript Check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx expo export --platform web --output-dir dist
        name: Expo Export (Web)
        continue-on-error: false

  build-android:
    name: Build Android (EAS)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: eas build --platform android --profile production --non-interactive
        name: EAS Android Build

  build-ios:
    name: Build iOS (EAS)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: eas build --platform ios --profile production --non-interactive
        name: EAS iOS Build
