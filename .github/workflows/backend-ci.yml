name: Backend CI/CD

on:
  push:
    branches: [main, develop, backend]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, backend]
    paths:
      - 'backend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  PROJECT_ID: noir-wallet-hackathon
  SERVICE: noir-backend

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/asset/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - run: cargo build --release --locked
        name: Build

      - run: cargo test --lib
        name: Run Unit Tests

      - run: cargo clippy -- -D warnings
        name: Clippy

      - run: cargo fmt -- --check
        name: Format Check

  deploy:
    name: Build & Deploy to Cloud Run
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3

      - id: docker-auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/noir-backend/${{ env.SERVICE }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: backend/asset
          file: backend/asset/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ steps.meta.outputs.tags }}
          region: ${{ env.REGION }}
          env_vars: |
            ENVIRONMENT=production
            STELLAR_NETWORK=testnet
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            MASTER_KEY_ID=MASTER_KEY_ID:latest
            CHANNEL_SECRET_KEY=CHANNEL_SECRET_KEY:latest
            ISSUER_ADDRESS=ISSUER_ADDRESS:latest
            PDAX_API_KEY=PDAX_API_KEY:latest
            PDAX_SECRET_KEY=PDAX_SECRET_KEY:latest
            PDAX_CLIENT_ID=PDAX_CLIENT_ID:latest
            TERMINAL_ID=TERMINAL_ID:latest
