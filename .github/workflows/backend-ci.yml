name: Backend CI/CD

on:
  push:
    branches: [main, develop, backend]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, backend]
    paths:
      - 'backend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/asset

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: stellar-expert/soroban-cli-action@v1
        with:
          version: latest

      - run: cargo build --release --locked
        name: Build

      - run: cargo test
        name: Run Tests

      - run: cargo clippy -- -D warnings
        name: Clippy

      - run: cargo fmt -- --check
        name: Format Check

  docker:
    name: Build & Push Docker Image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/noir-backend
          tags: |
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=ref,event=branch
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend/asset
          file: backend/asset/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
