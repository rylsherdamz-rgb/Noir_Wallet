version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: noir_wallet_postgres
    environment:
      POSTGRES_USER: noir_user
      POSTGRES_PASSWORD: noir_password
      POSTGRES_DB: noir_wallet_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noir_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noir_wallet_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://noir_user:noir_password@postgres:5432/noir_wallet_dev
      STELLAR_NETWORK: testnet
      STELLAR_RPC_URL: https://soroban-testnet.stellar.org
      API_PORT: 8080
      API_HOST: 0.0.0.0
      LOG_LEVEL: debug
      RUST_LOG: backend=debug,actix_web=info
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    command: cargo run

volumes:
  postgres_data:
